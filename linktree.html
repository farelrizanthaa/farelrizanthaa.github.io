    <style>
        body {
            background-color: color-mix(in srgb, #780016 93%, white 3%);
            font-family: "link sans";
        }
        .container {
            border-radius: 24px;
            background: linear-gradient(0deg, rgb(120, 0, 22), rgb(196, 21, 0));
            width: 90%;
            max-width: 580px;
            padding: 28px;
            padding-top: 30px;
            margin-top: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Navbar */
        .topbar-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 26px;
        }

        .col-kanan {
            display: flex;
            justify-content: flex-end;
        }
        /* Profile Foto & Nama */
        .profile-section {
            text-align: center;
        }

        .profile {
            width: 96px;
        }

        .username {
            color: #ffffff;
            font-weight: 600;
            font-size: 23px;
            margin-top: 10px;
        }
        /* List Button Link */
        .links-section {
            margin-top: 11px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 64px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            border: 1px solid #ffffff;
            border-radius: 32px;
            padding: 8px 8px;
            text-decoration: none;
            cursor: pointer;
        }

        .link-btn:hover {
            background-color: rgba(255, 255, 255, 0.088);
            border-radius: 32px;
            text-decoration: none;
        }
        /* (foto) */
        .link-icon {
            width: 48px;
            object-fit: cover;
            flex-shrink: 0;
        }
        /* (text) */
        .link-label {
            flex: 1;
            text-align: center;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            padding: 4px 46px;
            padding-left: 30px;
        }
        /* (titik 3) */
        .link-dots {
            color: rgba(255, 255, 255, 0.475);
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 14px;
            padding-bottom: 3px;
        }

        .link-dots:hover {
            background-color: rgba(0, 0, 0, 0.129);
            color: white;
            border-radius: 80%;
        }

        .footer {
            text-align: center;
            margin-top: auto;
            margin-bottom: 40px;
        }

        .footer-btn {
            border: 1px solid white;
            background-color: white;
            border-radius: 32px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            color: black;
            cursor: pointer;
            padding: 11px 15px;
            margin-bottom: 12px;
        }

        .footer-btn:hover {
            text-decoration: none;
            color: black;
        }

        .footer-links {
            margin-top: 3px;
            padding-top: 14px;
            text-align: center;
            font-size: 10px;
            color: white;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: white;
            text-decoration: none;
        }
